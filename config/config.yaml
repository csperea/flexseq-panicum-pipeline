# fastp trimming -----------------------------------------------
fastp:
  min_length: 50          # discard reads shorter than this after trimming
  qualified_quality_phred: 20   # minimum base quality
  cut_window_size: 4      # sliding window size for quality trimming
  cut_mean_quality: 20    # mean quality threshold in window

# Alignment ----------------------------------------------------
bwa:
  extra: "-M"             # -M marks split-hit as secondary (required by some downstream tools)
  threads: 8

# Variant calling ----------------------------------------------
freebayes:
  ploidy: 4               # Panicum maximum is tetraploid (2n=4x=32)
  min_coverage: 10        # minimum read depth at a site to call variants
  min_alternate_fraction: 0.1   # min fraction of reads supporting alt allele
  min_alternate_count: 3  # min number of reads supporting alt allele

# VCF filtering ------------------------------------------------
filter:
  min_qual: 20            # minimum QUAL score
  min_depth: 10           # minimum DP across all samples
  max_missing: 0.2        # maximum fraction of missing genotypes per site (20%)
